<script>
  const ws = new WebSocket("wss://hotopiya.onrender.com");

  const messagesDiv = document.getElementById('messages');
  const userList = document.getElementById('user-list');

  let myNickname = "";

  ws.onopen = () => console.log("✅ 已連線");
  ws.onerror = (e) => console.log("❌ WebSocket錯誤", e);
  ws.onclose = () => console.log("⚠️ 連線關閉");

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.onlineUsers) {
      userList.innerHTML = "";
      data.onlineUsers.forEach(u => {
        const li = document.createElement('li');
        li.textContent = u;
        userList.appendChild(li);
      });
    }

    if (data.text) {
      const p = document.createElement('p');
      p.className = 'message';
      p.innerHTML = `<strong>${data.nickname}：</strong> ${data.text}`;
      messagesDiv.appendChild(p);
    }

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  };

  function sendMessage() {
    let nickname = document.getElementById('nickname').value.trim() || "匿名";
    if (!myNickname) myNickname = nickname;

    const input = document.getElementById('input');
    const msg = input.value.trim();

    if (msg) {
      ws.send(JSON.stringify({ nickname: myNickname, text: msg }));
      input.value = "";
    }
  }

  document.getElementById('send').onclick = sendMessage;

  document.getElementById('input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
